<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRONPEAK Training Club</title>
  </head>
  <body>
    <script>
      // SPA redirect for GitHub Pages (BrowserRouter support)
      // Adapted from the common "spa-github-pages" approach.
      (function () {
        var l = window.location;
        var base = '/iron-peak-gym';
        var path = l.pathname.replace(base, '');
        var search = l.search ? l.search : '';
        var hash = l.hash ? l.hash : '';
        var target = base + '/?p=' + encodeURIComponent(path + search + hash);
        l.replace(target);
      })();
    </script>
  </body>
</html>
